<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול - Gatekeeper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container, .admin-container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      color: #1a1a1a;
      margin-bottom: 25px;
      font-size: 22px;
    }

    h2 {
      color: #333;
      font-size: 18px;
      margin: 25px 0 15px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    h2:first-of-type { border-top: none; padding-top: 0; margin-top: 5px; }

    label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
      direction: ltr;
      margin-bottom: 15px;
    }

    input:focus { border-color: #075e54; }

    .btn {
      padding: 12px 25px;
      background: #075e54;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover { background: #064e46; }

    .btn-secondary {
      background: #666;
    }

    .btn-secondary:hover { background: #555; }

    .stat-box {
      background: #e8f5e9;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .stat-number {
      font-size: 42px;
      font-weight: 700;
      color: #2e7d32;
    }

    .stat-label {
      color: #555;
      font-size: 14px;
      margin-top: 5px;
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    .log-table th {
      background: #f5f5f5;
      padding: 10px 12px;
      text-align: right;
      font-weight: 600;
      color: #333;
    }

    .log-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      color: #555;
      direction: ltr;
      text-align: right;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 100;
      animation: fadeIn 0.3s;
    }

    .hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <h1>כניסת מנהל</h1>
    <label>סיסמה</label>
    <input type="password" id="passwordInput" placeholder="הזן סיסמה" onkeydown="if(event.key==='Enter') login()">
    <br>
    <button class="btn" onclick="login()">כניסה</button>
  </div>

  <!-- Admin Panel -->
  <div class="admin-container hidden" id="adminPanel">
    <h1>לוח בקרה</h1>

    <div class="stat-box">
      <div class="stat-number" id="accessCount">0</div>
      <div class="stat-label">אנשים קיבלו את הלינק</div>
    </div>

    <h2>הגדרות</h2>

    <label>לינק קבוצת וואטסאפ</label>
    <input type="url" id="whatsappLink" placeholder="https://chat.whatsapp.com/...">

    <label>לינק Google Sheet (CSV)</label>
    <input type="url" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv">

    <button class="btn" onclick="saveConfig()">שמור הגדרות</button>

    <h2>שינוי סיסמה</h2>
    <label>סיסמה חדשה</label>
    <input type="password" id="newPassword" placeholder="סיסמה חדשה">
    <button class="btn btn-secondary" onclick="changePassword()">עדכן סיסמה</button>

    <h2>יומן גישה</h2>
    <table class="log-table" id="logTable">
      <thead>
        <tr>
          <th>טלפון</th>
          <th>תאריך</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let adminPassword = '';

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function login() {
      adminPassword = document.getElementById('passwordInput').value;
      try {
        const res = await fetch('/admin/config?password=' + encodeURIComponent(adminPassword));
        if (res.ok) {
          const data = await res.json();
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('adminPanel').classList.remove('hidden');
          document.getElementById('whatsappLink').value = data.whatsapp_link;
          document.getElementById('sheetUrl').value = data.sheet_url;
          document.getElementById('accessCount').textContent = data.access_count;
          loadLog();
        } else {
          showToast('סיסמה שגויה');
        }
      } catch (err) {
        showToast('שגיאה בחיבור לשרת');
      }
    }

    async function saveConfig() {
      const res = await fetch('/admin/config', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Password': adminPassword,
        },
        body: JSON.stringify({
          whatsapp_link: document.getElementById('whatsappLink').value,
          sheet_url: document.getElementById('sheetUrl').value,
        }),
      });

      if (res.ok) {
        showToast('ההגדרות נשמרו בהצלחה');
      } else {
        showToast('שגיאה בשמירה');
      }
    }

    async function changePassword() {
      const newPass = document.getElementById('newPassword').value;
      if (!newPass) return showToast('יש להזין סיסמה חדשה');

      const res = await fetch('/admin/config', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Password': adminPassword,
        },
        body: JSON.stringify({ new_password: newPass }),
      });

      if (res.ok) {
        adminPassword = newPass;
        document.getElementById('newPassword').value = '';
        showToast('הסיסמה עודכנה בהצלחה');
      }
    }

    async function loadLog() {
      const res = await fetch('/admin/log', {
        headers: { 'X-Admin-Password': adminPassword },
      });

      if (res.ok) {
        const log = await res.json();
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = log.map(entry => `
          <tr>
            <td>${entry.phone}</td>
            <td>${new Date(entry.created_at).toLocaleString('he-IL')}</td>
          </tr>
        `).join('');
      }
    }
  </script>
</body>
</html>
