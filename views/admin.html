<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ניהול - Gatekeeper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container, .admin-container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 { color: #1a1a1a; margin-bottom: 25px; font-size: 22px; }

    h2 {
      color: #333; font-size: 18px; margin: 25px 0 15px;
      padding-top: 20px; border-top: 1px solid #eee;
    }

    h2:first-of-type { border-top: none; padding-top: 0; margin-top: 5px; }

    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }

    input[type="text"], input[type="password"], input[type="url"] {
      width: 100%; padding: 12px 15px; border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 15px; outline: none; transition: border-color 0.3s; direction: ltr; margin-bottom: 15px;
    }

    input:focus { border-color: #075e54; }

    .btn {
      padding: 12px 25px; background: #075e54; color: white; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.3s;
    }

    .btn:hover { background: #064e46; }
    .btn-secondary { background: #666; }
    .btn-secondary:hover { background: #555; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: #e8f5e9;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }

    .stat-box.blue { background: #e3f2fd; }
    .stat-box.orange { background: #fff3e0; }
    .stat-box.purple { background: #f3e5f5; }

    .stat-number { font-size: 32px; font-weight: 700; color: #2e7d32; }
    .stat-box.blue .stat-number { color: #1565c0; }
    .stat-box.orange .stat-number { color: #e65100; }
    .stat-box.purple .stat-number { color: #6a1b9a; }

    .stat-label { color: #555; font-size: 13px; margin-top: 4px; }

    .log-table {
      width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px;
    }

    .log-table th {
      background: #f5f5f5; padding: 10px 12px; text-align: right; font-weight: 600; color: #333;
    }

    .log-table td {
      padding: 10px 12px; border-bottom: 1px solid #eee; color: #555; text-align: right;
    }

    .log-table td.phone-cell { direction: ltr; text-align: right; font-family: monospace; }

    .choice-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .choice-only_new { background: #fff3e0; color: #e65100; }
    .choice-both { background: #e3f2fd; color: #1565c0; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 12px 25px; border-radius: 8px;
      font-size: 14px; display: none; z-index: 100; animation: fadeIn 0.3s;
    }

    .hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <div class="login-container" id="loginScreen">
    <h1>כניסת מנהל</h1>
    <label>סיסמה</label>
    <input type="password" id="passwordInput" placeholder="הזן סיסמה" onkeydown="if(event.key==='Enter') login()">
    <br>
    <button class="btn" onclick="login()">כניסה</button>
  </div>

  <div class="admin-container hidden" id="adminPanel">
    <h1>לוח בקרה</h1>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number" id="accessCount">0</div>
        <div class="stat-label">קיבלו לינק</div>
      </div>
      <div class="stat-box blue">
        <div class="stat-number" id="approvedCount">0</div>
        <div class="stat-label">מאושרים ברשימה</div>
      </div>
      <div class="stat-box orange">
        <div class="stat-number" id="onlyNewCount">0</div>
        <div class="stat-label">רק לחדשה</div>
      </div>
      <div class="stat-box purple">
        <div class="stat-number" id="bothCount">0</div>
        <div class="stat-label">בשתי הקבוצות</div>
      </div>
    </div>

    <h2>הגדרות</h2>

    <label>לינק קבוצת וואטסאפ</label>
    <input type="url" id="whatsappLink" placeholder="https://chat.whatsapp.com/...">

    <button class="btn" onclick="saveConfig()">שמור</button>

    <h2>שינוי סיסמה</h2>
    <label>סיסמה חדשה</label>
    <input type="password" id="newPassword" placeholder="סיסמה חדשה">
    <button class="btn btn-secondary" onclick="changePassword()">עדכן סיסמה</button>

    <h2>יומן גישה</h2>
    <table class="log-table" id="logTable">
      <thead>
        <tr>
          <th>טלפון</th>
          <th>בחירה</th>
          <th>תאריך</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>

    <h2>בוט אישור אוטומטי</h2>

    <div id="botStatus" style="margin-bottom:15px;">
      <div id="botStatusBadge" style="display:inline-block; padding:6px 14px; border-radius:14px; font-size:13px; font-weight:600; background:#eee; color:#555;">טוען...</div>
      <span id="botStatusDetail" style="margin-right:10px; color:#555; font-size:13px;"></span>
    </div>

    <div id="botQrSection" style="display:none; text-align:center; background:#fafafa; padding:20px; border-radius:12px; margin-bottom:15px;">
      <p style="margin-bottom:12px; color:#333; font-size:14px;">סרוק את ה-QR עם וואטסאפ בטלפון: <strong>הגדרות → מכשירים מקושרים → קישור מכשיר</strong></p>
      <img id="botQrImg" style="max-width:260px; border:1px solid #ddd; border-radius:8px;">
    </div>

    <div id="botConfigSection" style="display:none;">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-number" id="botApprovedCount">0</div>
          <div class="stat-label">אושרו</div>
        </div>
        <div class="stat-box orange">
          <div class="stat-number" id="botRejectedCount">0</div>
          <div class="stat-label">נדחו</div>
        </div>
      </div>

      <label>הקבוצה הישנה (מקור — ממנה בודקים חברות)</label>
      <select id="oldGroupSelect" style="width:100%; padding:12px; border:1.5px solid #ddd; border-radius:10px; margin-bottom:15px; font-size:15px;"></select>

      <label>הקבוצה החדשה (יעד — שם מאשרים בקשות)</label>
      <select id="newGroupSelect" style="width:100%; padding:12px; border:1.5px solid #ddd; border-radius:10px; margin-bottom:15px; font-size:15px;"></select>

      <button class="btn" onclick="saveBotConfig()">שמור</button>
      <button class="btn btn-secondary" onclick="syncPending()" style="margin-right:8px;">סרוק בקשות ממתינות</button>
      <button class="btn btn-secondary" onclick="logoutBot()" style="margin-right:8px; background:#c62828;">נתק</button>
    </div>

    <div id="botConnectSection" style="display:none;">
      <button class="btn" onclick="startBot()">התחבר לוואטסאפ</button>
    </div>

    <h2>יומן פעולות בוט</h2>
    <table class="log-table">
      <thead>
        <tr>
          <th>טלפון</th>
          <th>פעולה</th>
          <th>סיבה</th>
          <th>תאריך</th>
        </tr>
      </thead>
      <tbody id="botLogBody"></tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let adminPassword = '';

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function login() {
      adminPassword = document.getElementById('passwordInput').value;
      try {
        const res = await fetch('/admin/config?password=' + encodeURIComponent(adminPassword));
        if (res.ok) {
          const data = await res.json();
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('adminPanel').classList.remove('hidden');
          document.getElementById('whatsappLink').value = data.whatsapp_link || '';
          document.getElementById('accessCount').textContent = data.access_count;
          document.getElementById('approvedCount').textContent = data.approved_count;
          document.getElementById('onlyNewCount').textContent = data.only_new_count;
          document.getElementById('bothCount').textContent = data.both_count;
          loadLog();
        } else {
          showToast('סיסמה שגויה');
        }
      } catch (err) {
        showToast('שגיאה בחיבור לשרת');
      }
    }

    async function saveConfig() {
      const res = await fetch('/admin/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
        body: JSON.stringify({ whatsapp_link: document.getElementById('whatsappLink').value }),
      });
      showToast(res.ok ? 'ההגדרות נשמרו' : 'שגיאה בשמירה');
    }

    async function changePassword() {
      const newPass = document.getElementById('newPassword').value;
      if (!newPass) return showToast('יש להזין סיסמה חדשה');
      const res = await fetch('/admin/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
        body: JSON.stringify({ new_password: newPass }),
      });
      if (res.ok) {
        adminPassword = newPass;
        document.getElementById('newPassword').value = '';
        showToast('הסיסמה עודכנה');
      }
    }

    function choiceLabel(choice) {
      if (choice === 'only_new') return '<span class="choice-badge choice-only_new">רק לחדשה</span>';
      if (choice === 'both') return '<span class="choice-badge choice-both">בשתיהן</span>';
      return choice || '-';
    }

    async function loadLog() {
      const res = await fetch('/admin/log', { headers: { 'X-Admin-Password': adminPassword } });
      if (res.ok) {
        const log = await res.json();
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = log.map(entry => `
          <tr>
            <td class="phone-cell">${entry.phone}</td>
            <td>${choiceLabel(entry.choice)}</td>
            <td>${new Date(entry.created_at).toLocaleString('he-IL')}</td>
          </tr>
        `).join('');
      }
    }

    // ---- Bot management ----
    function authHeaders() {
      return { 'X-Admin-Password': adminPassword };
    }

    const STATUS_LABELS = {
      disconnected: { label: 'מנותק', bg: '#ffebee', fg: '#c62828' },
      qr: { label: 'ממתין לסריקת QR', bg: '#fff3e0', fg: '#e65100' },
      authenticating: { label: 'מתחבר...', bg: '#e3f2fd', fg: '#1565c0' },
      ready: { label: 'מחובר ופעיל ✓', bg: '#e8f5e9', fg: '#2e7d32' },
      error: { label: 'שגיאה', bg: '#ffebee', fg: '#c62828' },
    };

    async function refreshBotStatus() {
      const res = await fetch('/admin/bot/status', { headers: authHeaders() });
      if (!res.ok) return;
      const s = await res.json();
      const badge = document.getElementById('botStatusBadge');
      const detail = document.getElementById('botStatusDetail');
      const info = STATUS_LABELS[s.status] || STATUS_LABELS.disconnected;
      badge.textContent = info.label;
      badge.style.background = info.bg;
      badge.style.color = info.fg;

      const qrSection = document.getElementById('botQrSection');
      const configSection = document.getElementById('botConfigSection');
      const connectSection = document.getElementById('botConnectSection');

      if (s.status === 'qr' && s.hasQr) {
        qrSection.style.display = 'block';
        configSection.style.display = 'none';
        connectSection.style.display = 'none';
        const qrRes = await fetch('/admin/bot/qr', { headers: authHeaders() });
        const qrData = await qrRes.json();
        if (qrData.qr) document.getElementById('botQrImg').src = qrData.qr;
      } else if (s.status === 'ready') {
        qrSection.style.display = 'none';
        configSection.style.display = 'block';
        connectSection.style.display = 'none';
        document.getElementById('botApprovedCount').textContent = s.approved;
        document.getElementById('botRejectedCount').textContent = s.rejected;
        detail.textContent = s.oldGroupName
          ? `ישנה: ${s.oldGroupName} (${s.oldGroupMemberCount}) | חדשה: ${s.newGroupName || '—'}`
          : 'בחר קבוצות';
        await loadGroups(s.oldGroupId, s.newGroupId);
      } else {
        qrSection.style.display = 'none';
        configSection.style.display = 'none';
        connectSection.style.display = 'block';
      }
    }

    async function loadGroups(currentOld, currentNew) {
      const res = await fetch('/admin/bot/groups', { headers: authHeaders() });
      if (!res.ok) return;
      const groups = await res.json();
      const options = '<option value="">-- בחר קבוצה --</option>' +
        groups.map(g => `<option value="${g.id}">${g.name} (${g.participantCount})</option>`).join('');
      const oldSel = document.getElementById('oldGroupSelect');
      const newSel = document.getElementById('newGroupSelect');
      if (!oldSel.value && !newSel.value) {
        oldSel.innerHTML = options;
        newSel.innerHTML = options;
        if (currentOld) oldSel.value = currentOld;
        if (currentNew) newSel.value = currentNew;
      }
    }

    async function startBot() {
      await fetch('/admin/bot/start', { method: 'POST', headers: authHeaders() });
      showToast('מתחיל חיבור...');
      refreshBotStatus();
    }

    async function logoutBot() {
      if (!confirm('לנתק את הבוט? תצטרך לסרוק QR מחדש.')) return;
      await fetch('/admin/bot/logout', { method: 'POST', headers: authHeaders() });
      showToast('הבוט נותק');
      refreshBotStatus();
    }

    async function saveBotConfig() {
      const old_group_id = document.getElementById('oldGroupSelect').value;
      const new_group_id = document.getElementById('newGroupSelect').value;
      const res = await fetch('/admin/bot/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ old_group_id, new_group_id }),
      });
      if (res.ok) {
        showToast('הגדרות הבוט נשמרו');
        fetch('/admin/bot/sync', { method: 'POST', headers: authHeaders() });
        refreshBotStatus();
      }
    }

    async function syncPending() {
      await fetch('/admin/bot/sync', { method: 'POST', headers: authHeaders() });
      showToast('סורק בקשות ממתינות...');
      setTimeout(loadBotLog, 3000);
    }

    async function loadBotLog() {
      const res = await fetch('/admin/bot/log', { headers: authHeaders() });
      if (!res.ok) return;
      const log = await res.json();
      const tbody = document.getElementById('botLogBody');
      const actionLabel = (a) => ({
        approved: '<span class="choice-badge" style="background:#e8f5e9;color:#2e7d32">אושר</span>',
        rejected: '<span class="choice-badge" style="background:#ffebee;color:#c62828">נדחה</span>',
        error: '<span class="choice-badge" style="background:#fff3e0;color:#e65100">שגיאה</span>',
      }[a] || a);
      tbody.innerHTML = log.map(e => `
        <tr>
          <td class="phone-cell">${e.phone || '-'}</td>
          <td>${actionLabel(e.action)}</td>
          <td style="font-size:12px;">${e.reason || ''}</td>
          <td>${new Date(e.created_at).toLocaleString('he-IL')}</td>
        </tr>
      `).join('');
    }

    let botInterval = null;
    function startBotPolling() {
      refreshBotStatus();
      loadBotLog();
      if (botInterval) return;
      botInterval = setInterval(() => { refreshBotStatus(); loadBotLog(); }, 3000);
    }

    const _origLogin = login;
    login = async function() {
      await _origLogin();
      if (!document.getElementById('adminPanel').classList.contains('hidden')) {
        startBotPolling();
      }
    };
  </script>
</body>
</html>
