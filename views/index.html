<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הצטרפות לקבוצה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #075e54 0%, #128c7e 50%, #25d366 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: #25d366;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 45px;
      height: 45px;
      fill: white;
    }

    h1 {
      color: #1a1a1a;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .phone-input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 18px;
      text-align: center;
      direction: ltr;
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 1px;
    }

    .phone-input:focus {
      border-color: #25d366;
    }

    .phone-input::placeholder {
      color: #bbb;
      letter-spacing: 0;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #25d366;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.1s;
    }

    .btn:hover { background: #1da851; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 12px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result.success {
      display: block;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
    }

    .result.error {
      display: block;
      background: #ffebee;
      border: 1px solid #ef9a9a;
      color: #c62828;
    }

    .result-message {
      font-size: 16px;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .whatsapp-btn {
      display: inline-block;
      padding: 12px 30px;
      background: #25d366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      transition: background 0.3s;
    }

    .whatsapp-btn:hover { background: #1da851; }

    .timer {
      margin-top: 12px;
      color: #888;
      font-size: 14px;
    }

    .timer strong {
      color: #c62828;
      font-size: 18px;
    }

    .spinner {
      display: none;
      width: 30px;
      height: 30px;
      border: 3px solid #e0e0e0;
      border-top-color: #25d366;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 15px auto 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </div>

    <h1>הצטרפות לקבוצה</h1>
    <p class="subtitle">הזינו את מספר הטלפון שלכם לאימות</p>

    <div id="formSection">
      <div class="form-group">
        <input
          type="tel"
          id="phoneInput"
          class="phone-input"
          placeholder="050-1234567"
          maxlength="15"
          autocomplete="tel"
        >
      </div>
      <button class="btn" id="submitBtn" onclick="validatePhone()">אימות והצטרפות</button>
      <div class="spinner" id="spinner"></div>
    </div>

    <div id="resultSuccess" class="result success">
      <div class="result-message" id="successMessage"></div>
      <a id="whatsappLink" class="whatsapp-btn" target="_blank" rel="noopener">
        פתח את הקבוצה בוואטסאפ
      </a>
      <div class="timer">
        הלינק ייעלם בעוד <strong id="countdown">30</strong> שניות
      </div>
    </div>

    <div id="resultError" class="result error">
      <div class="result-message" id="errorMessage"></div>
    </div>
  </div>

  <script>
    const phoneInput = document.getElementById('phoneInput');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');

    // Allow submit on Enter
    phoneInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') validatePhone();
    });

    async function validatePhone() {
      const phone = phoneInput.value.trim();
      if (!phone) {
        phoneInput.focus();
        return;
      }

      // Hide previous results
      document.getElementById('resultSuccess').className = 'result success hidden';
      document.getElementById('resultError').className = 'result error hidden';

      // Show loading
      submitBtn.disabled = true;
      spinner.style.display = 'block';

      try {
        const res = await fetch('/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone }),
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('successMessage').textContent = data.message;
          document.getElementById('whatsappLink').href = data.link;
          document.getElementById('resultSuccess').className = 'result success';
          document.getElementById('formSection').classList.add('hidden');
          startCountdown();
        } else {
          document.getElementById('errorMessage').textContent = data.message;
          document.getElementById('resultError').className = 'result error';
        }
      } catch (err) {
        document.getElementById('errorMessage').textContent = 'שגיאה בחיבור לשרת. נסו שוב.';
        document.getElementById('resultError').className = 'result error';
      }

      submitBtn.disabled = false;
      spinner.style.display = 'none';
    }

    function startCountdown() {
      let seconds = 30;
      const countdownEl = document.getElementById('countdown');
      const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(interval);
          document.getElementById('resultSuccess').innerHTML =
            '<div class="result-message">הלינק פג תוקף. ניתן לקבל פעם אחת בלבד.</div>';
        }
      }, 1000);
    }
  </script>
</body>
</html>
